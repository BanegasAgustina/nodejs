<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto 1 - Eventos DHTML</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/punto1/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-house-door-fill"></i> Volver al Inicio</a>
            <span class="navbar-text">Punto 1: Manipulación del DOM</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- Sidebar de Controles -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white fw-bold">
                        <i class="bi bi-sliders"></i> Controles DHTML
                    </div>
                    <div class="card-body">
                        <h6 class="text-uppercase text-muted small mb-3">Acciones sobre H1</h6>
                        <button id="btnAddH1" class="btn btn-outline-primary w-100 mb-2">
                            <i class="bi bi-plus-circle"></i> Agregar H1 (Hola DOM)
                        </button>
                        <button id="btnChangeH1" class="btn btn-outline-warning w-100 mb-2">
                            <i class="bi bi-pencil"></i> Cambiar Texto (Chau DOM)
                        </button>
                        <button id="btnColorH1" class="btn btn-outline-danger w-100 mb-4">
                            <i class="bi bi-palette"></i> Cambiar Color
                        </button>

                        <h6 class="text-uppercase text-muted small mb-3">Acciones sobre Imagen</h6>
                        <button id="btnAddImg" class="btn btn-outline-success w-100 mb-2">
                            <i class="bi bi-image"></i> Agregar Imagen
                        </button>
                        <button id="btnChangeImg" class="btn btn-outline-secondary w-100 mb-2">
                            <i class="bi bi-arrow-repeat"></i> Cambiar Imagen
                        </button>
                        <button id="btnSizeImg" class="btn btn-outline-dark w-100">
                            <i class="bi bi-aspect-ratio"></i> Cambiar Tamaño
                        </button>
                    </div>
                </div>
            </div>

            <!-- Área de Visualización -->
            <div class="col-md-8">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white fw-bold">
                        <i class="bi bi-display"></i> Resultado Dinámico
                    </div>
                    <div id="output-area" class="card-body d-flex flex-column align-items-center justify-content-center min-vh-50 text-center">
                        <p id="empty-msg" class="text-muted italic">Haz clic en los botones para ver la magia...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/punto1/script.js"></script>
</body>
</html>

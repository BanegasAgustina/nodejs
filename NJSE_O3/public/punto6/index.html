<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto 6 - Formulario de Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/punto6/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-house-door-fill"></i> Volver al Inicio</a>
            <span class="navbar-text">Punto 6: Formulario Dinámico</span>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow border-0 rounded-4 overflow-hidden">
                    <div class="card-header bg-primary text-white p-4">
                        <h3 class="mb-0"><i class="bi bi-person-plus"></i> Registro de Usuario</h3>
                        <p class="mb-0 opacity-75">Completa tus datos para continuar</p>
                    </div>
                    <div class="card-body p-4">
                        <form id="registration-form">
                            <!-- Texto -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nombre Completo</label>
                                <input type="text" name="fullName" class="form-control" placeholder="Ej: Juan Pérez" required>
                            </div>

                            <!-- Mail -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Correo Electrónico</label>
                                <input type="email" name="email" class="form-control" placeholder="juan@ejemplo.com" required>
                            </div>

                            <!-- Número -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Edad</label>
                                <input type="number" name="age" class="form-control" min="18" max="100" value="18">
                            </div>

                            <!-- Radio -->
                            <div class="mb-3">
                                <label class="form-label fw-bold d-block">Género</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="Masculino" checked>
                                    <label class="form-check-label">Masculino</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="Femenino">
                                    <label class="form-check-label">Femenino</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="Otro">
                                    <label class="form-check-label">Otro</label>
                                </div>
                            </div>

                            <!-- Select -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">País de Residencia</label>
                                <select name="country" class="form-select">
                                    <option value="Argentina">Argentina</option>
                                    <option value="Chile">Chile</option>
                                    <option value="Uruguay">Uruguay</option>
                                    <option value="España">España</option>
                                    <option value="México">México</option>
                                </select>
                            </div>

                            <!-- Checkbox -->
                            <div class="mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="newsletter" value="Suscrito">
                                    <label class="form-check-label">Deseo recibir noticias y promociones</label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm">
                                <i class="bi bi-send-fill"></i> Registrarme
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Resultado Dinámico -->
            <div class="col-lg-5 mt-4 mt-lg-0">
                <div id="result-container" class="card shadow border-0 rounded-4 d-none">
                    <div class="card-header bg-success text-white p-4">
                        <h3 class="mb-0"><i class="bi bi-check-circle"></i> Datos Registrados</h3>
                    </div>
                    <div class="card-body p-4" id="result-content">
                        <!-- Los datos aparecerán aquí -->
                    </div>
                    <div class="card-footer bg-white p-3 text-center">
                        <button onclick="window.print()" class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-printer"></i> Imprimir Comprobante
                        </button>
                    </div>
                </div>
                
                <div id="no-result" class="text-center p-5 text-muted border rounded-4 bg-white shadow-sm h-100 d-flex flex-column justify-content-center">
                    <i class="bi bi-clipboard-data display-1 opacity-25"></i>
                    <p class="mt-3 fs-5">Los datos aparecerán aquí después de enviar el formulario</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/punto6/script.js"></script>
</body>
</html>

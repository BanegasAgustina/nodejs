<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto 4 - Manipulación de Atributos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/punto4/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-warning mb-4">
        <div class="container">
            <a class="navbar-brand text-dark" href="/"><i class="bi bi-house-door-fill"></i> Volver al Inicio</a>
            <span class="navbar-text text-dark fw-bold">Punto 4: Nodos y Atributos</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- Panel de Control -->
            <div class="col-md-5 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white fw-bold">Configuración de Nodos</div>
                    <div class="card-body">
                        <button id="btnCreateNodes" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-plus-square"></i> Crear 5 Nodos de Enlace (<a>)
                        </button>
                        
                        <div id="modify-section" class="d-none">
                            <hr>
                            <label class="form-label fw-bold">Modificar Enlaces:</label>
                            <div class="input-group mb-2">
                                <span class="input-group-text">Nuevo URL</span>
                                <input type="text" id="new-url" class="form-control" value="https://www.bing.com">
                            </div>
                            <button id="btnModifyAttrs" class="btn btn-warning w-100">
                                <i class="bi bi-pencil-square"></i> Cambiar Atributos (HREF)
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Historial de Cambios -->
                <div class="card shadow-sm border-0 mt-4">
                    <div class="card-header bg-dark text-white fw-bold">Log de Actividad</div>
                    <div id="change-log" class="card-body small overflow-auto" style="max-height: 200px;">
                        <p class="text-muted italic">Esperando acciones...</p>
                    </div>
                </div>
            </div>

            <!-- Visualización de Nodos -->
            <div class="col-md-7">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white fw-bold">Enlaces Generados</div>
                    <div id="links-container" class="card-body d-flex flex-column gap-2">
                        <!-- Los enlaces aparecerán aquí -->
                        <div class="alert alert-secondary text-center">No hay enlaces creados.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/punto4/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto 5 - Inserción InnerHTML</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .stage {
            min-height: 400px;
            border: 2px dashed #dee2e6;
            border-radius: 1rem;
            background: white;
            padding: 2rem;
            transition: all 0.3s;
        }
        .html-object {
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger mb-4">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-house-door-fill"></i> Volver al Inicio</a>
            <span class="navbar-text">Punto 5: Inserción vía InnerHTML</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white fw-bold">Generador de Objetos</div>
                    <div class="card-body d-grid gap-2">
                        <button onclick="addAlert()" class="btn btn-outline-primary"><i class="bi bi-exclamation-triangle"></i> Agregar Alerta</button>
                        <button onclick="addCard()" class="btn btn-outline-success"><i class="bi bi-card-text"></i> Agregar Tarjeta</button>
                        <button onclick="addTable()" class="btn btn-outline-info"><i class="bi bi-table"></i> Agregar Tabla</button>
                        <button onclick="addList()" class="btn btn-outline-warning"><i class="bi bi-list-ul"></i> Agregar Lista</button>
                        <button onclick="addVideo()" class="btn btn-outline-dark"><i class="bi bi-play-circle"></i> Agregar Placeholder</button>
                        <hr>
                        <button onclick="clearStage()" class="btn btn-danger"><i class="bi bi-trash"></i> Limpiar Todo</button>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div id="stage" class="stage shadow-sm d-flex flex-column gap-3">
                    <div class="text-center text-muted my-auto" id="placeholder">
                        <i class="bi bi-box-seam display-1"></i>
                        <p class="mt-2">El escenario está vacío</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const placeholder = document.getElementById('placeholder');

        function checkPlaceholder() {
            placeholder.style.display = stage.children.length > 1 ? 'none' : 'block';
        }

        function addAlert() {
            stage.innerHTML += `
                <div class="alert alert-primary alert-dismissible fade show html-object" role="alert">
                    <strong>¡innerHTML!</strong> Se ha insertado este componente como texto HTML.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;
            checkPlaceholder();
        }

        function addCard() {
            stage.innerHTML += `
                <div class="card html-object shadow-sm" style="width: 18rem;">
                    <div class="card-body">
                        <h5 class="card-title">Tarjeta Dinámica</h5>
                        <p class="card-text">Este objeto fue inyectado usando la propiedad innerHTML del contenedor.</p>
                        <a href="#" class="btn btn-sm btn-primary">Acción</a>
                    </div>
                </div>`;
            checkPlaceholder();
        }

        function addTable() {
            stage.innerHTML += `
                <table class="table table-sm table-striped border html-object">
                    <thead class="table-dark">
                        <tr><th>ID</th><th>Nombre</th><th>Estado</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>1</td><td>Objeto A</td><td><span class="badge bg-success">Activo</span></td></tr>
                        <tr><td>2</td><td>Objeto B</td><td><span class="badge bg-secondary">Inactivo</span></td></tr>
                    </tbody>
                </table>`;
            checkPlaceholder();
        }

        function addList() {
            stage.innerHTML += `
                <ul class="list-group html-object">
                    <li class="list-group-item active">Lista inyectada</li>
                    <li class="list-group-item">Elemento 1</li>
                    <li class="list-group-item">Elemento 2</li>
                </ul>`;
            checkPlaceholder();
        }

        function addVideo() {
            stage.innerHTML += `
                <div class="bg-dark text-white p-5 rounded text-center html-object">
                    <i class="bi bi-play-btn display-4"></i>
                    <p>Placeholder de Video / Media</p>
                </div>`;
            checkPlaceholder();
        }

        function clearStage() {
            stage.innerHTML = `<div class="text-center text-muted my-auto" id="placeholder">
                        <i class="bi bi-box-seam display-1"></i>
                        <p class="mt-2">El escenario está vacío</p>
                    </div>`;
        }
    </script>
</body>
</html>
